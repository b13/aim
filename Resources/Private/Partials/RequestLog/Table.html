<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<div class="table-fit">
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.timestamp" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.extension" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.user" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.requestType" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.provider" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.model" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.tokens" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.cost" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.duration" /></th>
                <th><f:translate key="LLL:EXT:aim/Resources/Private/Language/locallang_module.xlf:requestLog.column.status" /></th>
            </tr>
        </thead>
        <tbody data-poll="rows">
            <f:for each="{paginator.paginatedItems}" as="entry">
                <f:render partial="RequestLog/Row" arguments="{entry: entry, extensionIcons: extensionIcons, userMap: userMap}" />
            </f:for>
        </tbody>
    </table>
</div>

</html>
